blueprint:
  name: Duck Media Volume During Voice
  description: >-
    Quiet selected media players while a Home Assistant Voice satellite is
    engaged — ducking the volume, pausing playback, or muting in that order
    of preference — then restore them when it returns to idle.
  author: Cory Charlton
  source_url: https://github.com/CCSWE-Home-Assistant/blueprints/automation/duck_volume_for_voice.yaml
  domain: automation
  input:
    voice_satellite_entity:
      name: Voice satellite
      selector:
        entity:
          filter:
            - domain: assist_satellite
    media_player_entities:
      name: Media players to duck
      selector:
        entity:
          filter:
            - domain: media_player
              supported_features:
                - media_player.MediaPlayerEntityFeature.VOLUME_SET
            - domain: media_player
              supported_features:
                - media_player.MediaPlayerEntityFeature.PAUSE
            - domain: media_player
              supported_features:
                - media_player.MediaPlayerEntityFeature.VOLUME_MUTE
          multiple: true
    duck_volume_level:
      name: Ducked volume level
      description: >-
        Volume level (0.0–1.0) for media players that support volume_set.
        Players that only support pause or mute will be paused (preferred) or
        muted as a fallback — this number is ignored for them.
      default: 0.05
      selector:
        number:
          min: 0
          max: 1
          step: 0.05
          mode: slider
    restore_timeout_seconds:
      name: Restore safety timeout
      description: Restore volumes after this many seconds even if the satellite never returns to idle (covers a known stuck-in-responding bug).
      default: 60
      selector:
        number:
          min: 5
          max: 600
          mode: box
          unit_of_measurement: seconds

mode: single
max_exceeded: silent

variables:
  media_player_entities: !input media_player_entities
  duck_volume_level: !input duck_volume_level
  volumes_to_set: >-
    {%- set ns = namespace(pairs=[]) -%}
    {%- for e in media_player_entities -%}
      {%- set sf = state_attr(e, 'supported_features') | int(0) -%}
      {%- if states(e) not in ['unavailable', 'unknown']
             and sf | bitwise_and(4) > 0
             and state_attr(e, 'volume_level') is not none -%}
        {%- set ns.pairs = ns.pairs + [{'entity_id': e, 'volume_level': state_attr(e, 'volume_level')}] -%}
      {%- endif -%}
    {%- endfor -%}
    {{ ns.pairs }}
  players_to_pause: >-
    {%- set ns = namespace(items=[]) -%}
    {%- for e in media_player_entities -%}
      {%- set sf = state_attr(e, 'supported_features') | int(0) -%}
      {%- if states(e) not in ['off', 'standby', 'unavailable', 'unknown', 'paused']
             and sf | bitwise_and(4) == 0
             and sf | bitwise_and(1) > 0
             and sf | bitwise_and(16384) > 0 -%}
        {%- set ns.items = ns.items + [e] -%}
      {%- endif -%}
    {%- endfor -%}
    {{ ns.items }}
  players_to_mute: >-
    {%- set ns = namespace(items=[]) -%}
    {%- for e in media_player_entities -%}
      {%- set sf = state_attr(e, 'supported_features') | int(0) -%}
      {%- if states(e) not in ['off', 'standby', 'unavailable', 'unknown', 'paused']
             and sf | bitwise_and(4) == 0
             and (sf | bitwise_and(1) == 0 or sf | bitwise_and(16384) == 0)
             and sf | bitwise_and(8) > 0
             and state_attr(e, 'is_volume_muted') is not true -%}
        {%- set ns.items = ns.items + [e] -%}
      {%- endif -%}
    {%- endfor -%}
    {{ ns.items }}

triggers:
  - trigger: state
    entity_id: !input voice_satellite_entity
    from: "idle"
    not_to:
      - "unavailable"
      - "unknown"

action:
  - if:
      - condition: template
        value_template: "{{ volumes_to_set | length > 0 }}"
    then:
      - action: media_player.volume_set
        target:
          entity_id: "{{ volumes_to_set | map(attribute='entity_id') | list }}"
        data:
          volume_level: "{{ duck_volume_level }}"
  - if:
      - condition: template
        value_template: "{{ players_to_pause | length > 0 }}"
    then:
      - action: media_player.media_pause
        target:
          entity_id: "{{ players_to_pause }}"
  - if:
      - condition: template
        value_template: "{{ players_to_mute | length > 0 }}"
    then:
      - action: media_player.volume_mute
        target:
          entity_id: "{{ players_to_mute }}"
        data:
          is_volume_muted: true
  - wait_for_trigger:
      - trigger: state
        entity_id: !input voice_satellite_entity
        to: "idle"
    timeout:
      seconds: !input restore_timeout_seconds
    continue_on_timeout: true
  - repeat:
      for_each: "{{ volumes_to_set }}"
      sequence:
        - action: media_player.volume_set
          target:
            entity_id: "{{ repeat.item.entity_id }}"
          data:
            volume_level: "{{ repeat.item.volume_level }}"
  - if:
      - condition: template
        value_template: "{{ players_to_pause | length > 0 }}"
    then:
      - action: media_player.media_play
        target:
          entity_id: "{{ players_to_pause }}"
  - if:
      - condition: template
        value_template: "{{ players_to_mute | length > 0 }}"
    then:
      - action: media_player.volume_mute
        target:
          entity_id: "{{ players_to_mute }}"
        data:
          is_volume_muted: false
