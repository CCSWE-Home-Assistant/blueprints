blueprint:
  name: Turn Off Area
  description: >-
    Turn off the fans, lights, and switches in a given area. Each device class
    can be excluded via the include toggles.
  author: Cory Charlton
  source_url: https://github.com/CCSWE-Home-Assistant/blueprints/script/turn_off_area.yaml
  domain: script
  input:
    area_id:
      name: Area
      selector:
        area:
    include_fans:
      name: Include Fans
      selector:
        boolean:
      default: true
    include_lights:
      name: Include Lights
      selector:
        boolean:
      default: true
    include_switches:
      name: Include Switches
      selector:
        boolean:
      default: true

mode: restart
max_exceeded: silent

variables:
  include_fans: !input include_fans
  include_lights: !input include_lights
  include_switches: !input include_switches

sequence:
  - if:
      - condition: template
        value_template: "{{ include_fans }}"
    then:
      - alias: "Turn Off Fans"
        action: fan.turn_off
        target:
          area_id: !input area_id
  - if:
      - condition: template
        value_template: "{{ include_lights }}"
    then:
      - alias: "Turn Off Lights"
        action: light.turn_off
        target:
          area_id: !input area_id
  - if:
      - condition: template
        value_template: "{{ include_switches }}"
    then:
      - alias: "Turn Off Switches"
        action: switch.turn_off
        target:
          area_id: !input area_id
